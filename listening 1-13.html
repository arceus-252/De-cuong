        body {
            background-color: #311b3d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Thanh cuộn chọn câu hỏi */
        .question-nav-scroll {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 10px 0;
            margin-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: #724988 #311b3d;
        }
        .question-nav-scroll::-webkit-scrollbar { height: 6px; }
        .question-nav-scroll::-webkit-scrollbar-thumb { background: #724988; border-radius: 10px; }

        .nav-dot {
            min-width: 40px;
            height: 40px;
            background-color: #5c3a6e;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            flex-shrink: 0;
            transition: all 0.2s;
            font-size: 14px;
        }
        .nav-dot.active { border: 2px solid #e9a02b; transform: scale(1.1); }
        .nav-dot.correct { background-color: #4CAF50 !important; }
        .nav-dot.incorrect { background-color: #f44336 !important; }

        /* Điểm số */
        .score-board {
            text-align: right;
            font-size: 18px;
            margin-bottom: 10px;
            color: #e9a02b;
            font-weight: bold;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .nav-btn {
            background-color: #5c3a6e;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .nav-btn:hover:not(:disabled) { background-color: #724988; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .question-box {
            background-color: #4a2b5a;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .options-container.vertical { flex-direction: column; }

        .option {
            flex: 1;
            padding: 30px 15px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s, box-shadow 0.2s, background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            color: white;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .option-a { background-color: #2c7bb6; }
        .option-b { background-color: #2a9d8f; }
        .option-c { background-color: #e9a02b; }

        .option.correct {
            background-color: #4CAF50 !important;
            border-color: #81c784;
            transform: scale(1.02);
        }

        .option.incorrect {
            background-color: #f44336 !important;
            opacity: 0.8;
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        .controls {
            display: flex;
            justify-content: space-between; /* Đổi sang giữa để nút reset và layout tách nhau */
            margin-top: 20px;
            gap: 10px;
        }

        .toggle-layout-btn, .reset-btn {
            background-color: #5c3a6e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            display: flex; align-items: center; gap: 8px;
        }

        .reset-btn { background-color: #8b4367; }
        .reset-btn:hover { background-color: #a6517d; }
        .toggle-layout-btn:hover { background-color: #724988; }

        .result-message {
            text-align: center;
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            min-height: 35px;
        }
    </style>
</head>

     // =====================================================================
    // PHẦN LOGIC XỬ LÝ: RESET
    // =====================================================================
    let currentIndex = 0;
    let score = 0;
    let userProgress = {}; // { index: true/false }

    function createNavigation() {
        const navScroll = document.getElementById('navScroll');
        navScroll.innerHTML = "";
        quizData.forEach((_, index) => {
            const dot = document.createElement('div');
            dot.className = 'nav-dot';
            dot.innerText = index + 1;
            dot.id = `nav-dot-${index}`;
            dot.onclick = () => {
                currentIndex = index;
                loadQuestion(currentIndex);
            };
            navScroll.appendChild(dot);
        });
    }

    function updateNavStyles() {
        const dots = document.querySelectorAll('.nav-dot');
        dots.forEach((dot, index) => {
            dot.classList.remove('active');
            if (index === currentIndex) dot.classList.add('active');
            
            dot.classList.remove('correct', 'incorrect');
            if (userProgress[index] === true) dot.classList.add('correct');
            else if (userProgress[index] === false) dot.classList.add('incorrect');
        });

        const activeDot = document.getElementById(`nav-dot-${currentIndex}`);
        if (activeDot) {
            activeDot.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    }

    function updateScoreDisplay() {
        const scoreBoard = document.getElementById('scoreBoard');
        scoreBoard.innerText = `Điểm: ${score} / ${Object.keys(userProgress).length}`;
    }

    function loadQuestion(index) {
        const qData = quizData[index];
        
        document.getElementById('questionText').innerText = qData.question;
        document.getElementById('questionCounter').innerText = `Câu ${index + 1} / ${quizData.length}`;
        document.getElementById('resultMessage').innerText = ""; 

        document.getElementById('prevBtn').disabled = (index === 0);
        document.getElementById('nextBtn').disabled = (index === quizData.length - 1);

        const container = document.getElementById('optionsContainer');
        container.innerHTML = ""; 

        qData.options.forEach((opt, optIndex) => {
            const div = document.createElement('div');
            div.className = `option ${opt.class}`;
            div.innerText = opt.text;
            div.id = `opt-${index}-${optIndex}`;
            
            if (userProgress[index] !== undefined) {
                div.classList.add('disabled');
                if (opt.isCorrect) div.classList.add('correct');
                // Nếu sai thì hiện đỏ (tùy chọn, ở đây hiện theo logic ban đầu là chỉ highlight đáp án đúng)
            }
            
            div.onclick = () => checkAnswer(div, opt.isCorrect, qData.options, index);
            container.appendChild(div);
        });

        updateNavStyles();
    }

    function checkAnswer(selectedElement, isCorrect, optionsData, questionIndex) {
        if (userProgress[questionIndex] !== undefined) return;

        const allOptions = document.querySelectorAll('.option');
        const resultMessage = document.getElementById('resultMessage');

        allOptions.forEach(option => option.classList.add('disabled'));

        userProgress[questionIndex] = isCorrect;

        if (isCorrect) {
            score++;
            selectedElement.classList.add('correct');
            selectedElement.classList.remove('disabled');
            resultMessage.textContent = "Chính xác!";
            resultMessage.style.color = "#4CAF50";
        } else {
            selectedElement.classList.add('incorrect');
            resultMessage.textContent = "Sai !";
            resultMessage.style.color = "#f44336";
            
            const correctOptIndex = optionsData.findIndex(opt => opt.isCorrect === true);
            const correctElement = document.getElementById(`opt-${questionIndex}-${correctOptIndex}`);
            if (correctElement) {
                correctElement.classList.remove('disabled');
                correctElement.classList.add('correct');
            }
        }

        updateScoreDisplay();
        updateNavStyles();

        // Tự động nhảy sau 0.75s
        setTimeout(() => {
            // Kiểm tra nếu người dùng vẫn ở câu cũ thì mới nhảy (tránh lỗi nếu vừa nhấn reset)
            if (currentIndex === questionIndex && currentIndex < quizData.length - 1 && userProgress[questionIndex] !== undefined) {
                changeQuestion(1);
            }
        }, 750);
    }

    // --- BỔ SUNG HÀM RESET ---
    function resetCurrentQuestion() {
        if (userProgress[currentIndex] === undefined) return; // Chưa làm thì không cần reset

        // Trừ điểm nếu câu đang đúng
        if (userProgress[currentIndex] === true) {
            score--;
        }

        // Xóa trạng thái của câu này
        delete userProgress[currentIndex];

        // Load lại câu hỏi
        loadQuestion(currentIndex);
        updateScoreDisplay();
        updateNavStyles();
    }

    function changeQuestion(step) {
        currentIndex += step;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= quizData.length) currentIndex = quizData.length - 1;
        loadQuestion(currentIndex);
    }

    function toggleLayout() {
        const container = document.getElementById('optionsContainer');
        container.classList.toggle('vertical');
    }

    window.onload = () => {
        createNavigation();
        loadQuestion(0);
        updateScoreDisplay();
    };

</script>
